name: CI / Build / Release

on:
  # CI on every push to any branch
  push:
    branches:
      - '**'
    tags:
      - 'v*.*.*.*'
    paths-ignore:
      - '.github/workflows/**'

  # Full build on PRs into main (no release)
  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:
  ci:
    name: CI Only (Tests + Coverage)
    uses: ScottyMac52/shared-github-workflows/.github/workflows/reusable-build-and-release.yml@main
    if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
    with:
      dotnet_version: '10.0.x'
      run_tests: true
      run_coverage: true
      run_build_release: false
      ci_mode: true
      create_release: false
    secrets:
      inherit: true

  build-on-main:
    name: Build on PR / Merge to Main
    uses: ScottyMac52/shared-github-workflows/.github/workflows/reusable-build-and-release.yml@main
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    with:
      dotnet_version: '10.0.x'
      run_tests: true
      run_coverage: true
      run_build_release: true
      ci_mode: false
      create_release: false
      enable_installer: false
    secrets:
      inherit: true

  release:
    name: Full Build + Release (on Tag)
    uses: ScottyMac52/shared-github-workflows/.github/workflows/reusable-build-and-release.yml@main
    if: startsWith(github.ref, 'refs/tags/')
    with:
      dotnet_version: '10.0.x'
      run_tests: true
      run_coverage: true
      run_build_release: true
      ci_mode: false
      create_release: true
      enable_installer: false   # set true if you want Setup.exe
    secrets:
      inherit: true
      
